name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to sha-<short> of current commit on the selected branch)"
        required: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    environment: production
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      owner: ${{ steps.owner.outputs.value }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute image tag
        id: meta
        # Pass the dispatch input through env instead of interpolating it
        # into the script, so a crafted tag can't inject shell commands.
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          TAG="$INPUT_IMAGE_TAG"
          if [ -z "$TAG" ]; then TAG="sha-${GITHUB_SHA::12}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push caddy (web tier - serves the Vite build + proxies /api)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: caddy/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/birceflix-caddy:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/birceflix-caddy:latest
          cache-from: type=gha,scope=caddy
          cache-to: type=gha,scope=caddy,mode=max

      - name: Build & push backend
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/birceflix-backend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/birceflix-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  deploy:
    name: Roll out to Hetzner
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      GHCR_OWNER: ${{ needs.build-and-push.outputs.owner }}
      REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
      APP_ENV: ${{ secrets.APP_ENV }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_ACTOR: ${{ github.actor }}
    steps:
      - name: SSH and rollout
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: IMAGE_TAG,GHCR_OWNER,REPO_URL,APP_ENV,GH_TOKEN,GH_ACTOR
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ secrets.DEPLOY_DIR }}"
            cd "$DEPLOY_DIR"

            # Repo is private — use the ephemeral GITHUB_TOKEN as a basic-auth
            # header for the duration of these git commands. Token never lands
            # in .git/config because we pass it inline via -c.
            AUTH_HEADER="Authorization: Basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)"
            if [ ! -d .git ]; then
              git -c "http.extraheader=$AUTH_HEADER" clone "$REPO_URL" .
              # Scrub the credential helper that clone sometimes records
              git config --unset-all http.extraheader 2>/dev/null || true
            fi
            git -c "http.extraheader=$AUTH_HEADER" fetch --quiet origin main
            git reset --hard origin/main

            # Render .env from the APP_ENV secret, then append/refresh
            # the two values the prod overlay needs at compose time.
            umask 077
            printf '%s\n' "$APP_ENV" > .env
            {
              echo "GHCR_OWNER=$GHCR_OWNER"
              echo "IMAGE_TAG=$IMAGE_TAG"
            } >> .env

            # GHCR packages are private by default; log in with the same token
            # so `compose pull` can fetch the freshly-pushed images.
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
