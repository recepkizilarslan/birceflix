name: Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend (vite build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run -w frontend build
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  backend:
    name: backend (tsc build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run -w backend build
      - uses: actions/upload-artifact@v7
        with:
          name: backend-dist
          path: backend/dist
          retention-days: 7

  docker:
    name: docker compose build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build images (no push)
        run: |
          docker buildx build -f frontend/Dockerfile -t birceflix/frontend:ci --load .
          docker buildx build -f backend/Dockerfile  -t birceflix/backend:ci  --load .
