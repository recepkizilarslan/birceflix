name: Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: frontend (vite build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run -w frontend build
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  backend:
    name: backend (tsc build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run -w backend build
      - uses: actions/upload-artifact@v7
        with:
          name: backend-dist
          path: backend/dist
          retention-days: 7

  docker:
    name: docker compose build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Build images (no push)
        run: |
          docker buildx build -f caddy/Dockerfile    -t birceflix/caddy:ci    --load .
          docker buildx build -f backend/Dockerfile  -t birceflix/backend:ci  --load .
