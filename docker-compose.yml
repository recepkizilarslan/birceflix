name: birceflix

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend
    networks: [edge]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    expose: ["80"]
    networks: [edge]

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    expose: ["3000"]
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: 0.0.0.0
      DATABASE_URL: postgres://birceflix:${DB_PASSWORD}@db:5432/birceflix
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_COOKIE_NAME: birceflix_session
      SESSION_TTL_DAYS: "30"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      TMDB_API_KEY: ${TMDB_API_KEY}
      OMDB_API_KEY: ${OMDB_API_KEY}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      DEFAULT_WATCH_REGION: ${DEFAULT_WATCH_REGION:-TR}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [edge, data]

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://birceflix:${DB_PASSWORD}@db:5432/birceflix
      # The migrator only needs DATABASE_URL but env validation requires the rest:
      SESSION_SECRET: ${SESSION_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      TMDB_API_KEY: ${TMDB_API_KEY}
      OMDB_API_KEY: ${OMDB_API_KEY}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
    depends_on:
      db:
        condition: service_healthy
    command: ["node", "--enable-source-maps", "dist/db/migrate.js"]
    networks: [data]

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: birceflix
      POSTGRES_USER: birceflix
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U birceflix -d birceflix"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [data]

volumes:
  db_data:
  caddy_data:
  caddy_config:

networks:
  edge:
  data:
