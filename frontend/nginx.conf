server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed assets, never-cache index.html
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — let React Router handle unknown paths
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri /index.html;
  }

  # Health check
  location = /healthz {
    access_log off;
    return 200 "ok\n";
  }
}
