# Production overlay — pulls pre-built images from GHCR instead of building
# them locally. The CI workflow (.github/workflows/deploy.yml) renders the
# .env (including GHCR_OWNER and the per-deploy IMAGE_TAG) and runs:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Manual rollback: trigger the Deploy workflow with an older sha-<short>
# image_tag, or on the server: `IMAGE_TAG=sha-<old> docker compose -f \
# docker-compose.yml -f docker-compose.prod.yml up -d`.

services:
  caddy:
    image: ghcr.io/${GHCR_OWNER}/birceflix-caddy:${IMAGE_TAG:-latest}
    pull_policy: always

  api:
    image: ghcr.io/${GHCR_OWNER}/birceflix-backend:${IMAGE_TAG:-latest}
    pull_policy: always

  migrate:
    image: ghcr.io/${GHCR_OWNER}/birceflix-backend:${IMAGE_TAG:-latest}
    pull_policy: always
